services:
  # --- PostgreSQL 17 ---
  db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./app/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aiwei-net

  # --- Node.js API (server.js) ---
  api:
    build: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PASS: ${DB_PASSWORD}
      PORT: 3000
    networks:
      - aiwei-net

  # --- Nginx (静态文件 + 反向代理) ---
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app:/usr/share/nginx/html:ro
    depends_on:
      - api
    networks:
      - aiwei-net

networks:
  aiwei-net:
    driver: bridge

volumes:
  db-data:
