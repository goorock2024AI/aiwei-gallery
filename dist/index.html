<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>艾维美术馆 · 运营数据管理</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="login-overlay" class="login-overlay">
  <div class="login-card">
    <div class="login-logo">艾维美术馆</div>
    <p class="login-subtitle">运营数据管理系统</p>
    <form id="login-form">
      <div class="form-group"><label>用户名</label><input type="text" id="login-username" autocomplete="username" placeholder="请输入用户名"></div>
      <div class="form-group"><label>密码</label><input type="password" id="login-password" autocomplete="current-password" placeholder="请输入密码"></div>
      <p id="login-error" class="login-error"></p>
      <button type="submit" class="btn btn-primary login-btn">登 录</button>
    </form>
  </div>
</div>

<div id="change-pwd-overlay" class="login-overlay" style="display:none">
  <div class="login-card">
    <div class="login-logo">首次登录</div>
    <p class="login-subtitle">请修改初始密码后继续使用</p>
    <form id="change-pwd-form">
      <div class="form-group"><label>新密码（至少 6 位）</label><input type="password" id="new-pwd" minlength="6" autocomplete="new-password"></div>
      <div class="form-group"><label>确认新密码</label><input type="password" id="new-pwd-confirm" minlength="6" autocomplete="new-password"></div>
      <p id="change-pwd-error" class="login-error"></p>
      <button type="submit" class="btn btn-primary login-btn">确认修改</button>
    </form>
  </div>
</div>

<div id="app" style="display:none">
  <aside id="sidebar">
    <div class="sidebar-header">
      <h1>艾维美术馆</h1>
      <span class="sidebar-subtitle">运营数据管理</span>
    </div>
    <nav id="sidebar-nav">
      <button class="tab-btn active" data-tab="revenue">💰 收银台</button>
      <button class="tab-btn" data-tab="expense">🧾 支出录入</button>
      <button class="tab-btn" data-tab="gallery">🖼️ 画廊销售</button>
      <button class="tab-btn" data-tab="space">🏛 空间使用</button>
      <button class="tab-btn" data-tab="reports">📊 数据报表</button>
      <button class="tab-btn tab-btn-admin" data-tab="manage">⚙️ 数据管理</button>
      <button class="tab-btn tab-btn-admin" data-tab="products">📦 产品管理</button>
      <button class="tab-btn tab-btn-admin" data-tab="users">👥 用户管理</button>
      <div class="nav-divider"></div>
      <button class="tab-btn tab-btn-logout" onclick="Auth.logout()">🚪 退出</button>
    </nav>
    <div id="sidebar-user" class="sidebar-user" style="display:none">
      <span id="sidebar-username"></span>
      <button class="btn-logout" onclick="Auth.logout()">退出</button>
    </div>
  </aside>
  <div id="main-area">
    <main id="main-content">
      <div id="page-dashboard" class="page"></div>
      <div id="page-revenue" class="page active"></div>
      <div id="page-expense" class="page"></div>
      <div id="page-gallery" class="page"></div>
      <div id="page-space" class="page"></div>
      <div id="page-reports" class="page"></div>
      <div id="page-manage" class="page"></div>
      <div id="page-products" class="page"></div>
      <div id="page-users" class="page"></div>
    </main>
  </div>
  <div id="loading-overlay" class="loading-overlay" style="display:none"><div class="spinner"></div></div>
</div>
<div id="toast-container"></div>
<script src="lib/supabase.umd.min.js"></script>
<script src="lib/xlsx.full.min.js"></script>
<script src="lib/chart.umd.min.js"></script>
<script src="js/supabase-config.js?v=2"></script>
<script src="js/models.js?v=2"></script>
<script src="js/store.js?v=2"></script>
<script src="js/ui.js?v=2"></script>
<script src="js/charts.js?v=2"></script>
<script src="js/import-export.js?v=2"></script>
<script src="js/auth.js?v=3"></script>
<script src="js/app.js?v=4"></script>
</body>
</html>
